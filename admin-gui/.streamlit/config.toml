[server]
port = 8088
address = "0.0.0.0"
enableCORS = false
headless = true

# Use certs in /admin-gui/config (auto-generated by entrypoint if missing)
sslCertFile = "/admin-gui/config/admin-ui.crt"
sslKeyFile  = "/admin-gui/config/admin-ui.key"

[client]
toolbarMode = "viewer"

[browser]
gatherUsageStats = false
